<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>純文字符號切換範例</title>
</head>
<body style="font-family: sans-serif; padding: 30px;">

    <!-- 步驟一按鈕 -->
    <button onclick="startGuide()" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">
        第一步：按下去開始引導
    </button>

    <!-- 提示文字區塊：預設先隱藏 -->
    <div id="guide-box" style="display: none; margin-top: 20px; font-size: 18px; color: #333;">
        ➔ 接下來請進行下一步 <span id="symbol">●</span>
    </div>

    <script>
        function startGuide() {
            // 1. 先把提示文字區塊顯示出來
            document.getElementById('guide-box').style.display = 'block';
            
            const symbolElement = document.getElementById('symbol');
            let count = 0; // 紀錄切換了幾次

            // 2. 設定每 500 毫秒（0.5秒）執行一次切換
            const timer = setInterval(function() {
                // 如果目前的文字是實心，就換成空心；反之亦然
                if (symbolElement.innerText === "●") {
                    symbolElement.innerText = "○";
                } else {
                    symbolElement.innerText = "●";
                }

                count++;

                // 3. 重覆兩次（實➔空、空➔實、實➔空、空➔實，總共切換 4 次）後停止
                if (count >= 4) {
                    clearInterval(timer); // 刪除定時器，讓它徹底靜止
                }
            }, 500); 
        }
    </script>

</body>
</html>

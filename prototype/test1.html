<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>候選代課教師卡片測試</title>
<style>
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --partner: #ea580c;
    --partner-soft: #fff7ed;
    --text: #1f2937;
    --muted: #6b7280;
    --bg: #f1f5f9;
    --panel: #ffffff;
    --accent: #fef3c7;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 20px;
    background: var(--bg);
    color: var(--text);
    font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    display: flex;
    justify-content: center; /* 讓內容置中 */
  }

  main {
    width: 100%;
    max-width: 800px;
  }

  .teacher-card {
    background: var(--panel);
    border-radius: 12px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    padding: 24px;
    border-top: 6px solid var(--partner); /* 頂部主題條 */
  }

  .card-header {
    border-bottom: 2px dashed #e5e7eb;
    margin-bottom: 20px;
    padding-bottom: 15px;
  }

  .card-title {
    margin: 0 0 8px 0;
    font-size: 22px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::before {
    content: "📅"; /* 加入小圖示 */
  }

  .legend {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
    background: #f8fafc;
    padding: 8px 12px;
    border-radius: 6px;
    display: inline-block;
  }

  .legend .homeroom { color: #dc2626; font-weight: bold; }
  .legend .same-subject { color: #16a34a; }

  .instruction {
    background: var(--accent);
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 25px;
    border-left: 4px solid #f59e0b;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .instruction div {
    font-weight: 700;
    color: #92400e;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .candidate-group {
    margin-bottom: 24px;
  }

  .group-title {
    margin: 0 0 12px 0;
    color: var(--primary);
    font-size: 16px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .group-title::before {
    content: "💡";
  }

  .button-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .teacher-button {
    cursor: pointer;
    padding: 8px 16px;
    border-radius: 20px; /* 膠囊形狀更親切 */
    border: 1.5px solid #d1d5db;
    background: white;
    transition: all 0.2s;
    font-size: 15px;
  }

  .teacher-button:hover {
    border-color: var(--primary);
    background: #eff6ff;
  }

  .teacher-button.is-selected {
    border-color: var(--partner);
    background: var(--partner);
    color: white;
    box-shadow: 0 4px 10px rgba(234, 88, 12, 0.3);
  }

  .teacher-button .meta {
    font-size: 13px;
    opacity: 0.8;
  }

  .action-row {
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid #eee;
    display: flex;
    justify-content: flex-end; /* 按鈕靠右，符合操作習慣 */
    gap: 12px;
  }

  .action-button {
    padding: 10px 24px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s;
  }

  .action-button:active { transform: scale(0.98); }

  .action-button.primary {
    background: var(--primary);
    color: white;
    border: none;
  }

  .action-button.primary:hover { background: var(--primary-dark); }

  .collapsible-sample {
    margin-top: 15px;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    text-align: center;
    padding: 8px;
    border: 1px dashed #ccc;
    border-radius: 6px;
  }
</style>
</head>
<body>
  <main>
    <article class="teacher-card" aria-labelledby="teacher-card-title">
      <header class="card-header">
        <h1 class="card-title" id="teacher-card-title">候選代課教師</h1>
        <p class="legend">
          <span class="homeroom">紅色</span> = 導師，
          <span class="same-subject">綠色</span> = 同科教師
        </p>
      </header>

      <section class="instruction" aria-label="操作說明">
        <div>請選擇一位可代課教師。</div>
        <div>選取後按下確認即可套用。</div>
      </section>

      <section class="candidate-group" aria-labelledby="same-subject-title">
        <h2 class="group-title" id="same-subject-title">同科教師</h2>
        <div class="button-row">
          <button class="teacher-button is-selected" type="button">
            王老師 <span class="meta same-subject">(數學)</span>
          </button>
          <button class="teacher-button" type="button">
            陳老師 <span class="meta same-subject">(數學)</span>
          </button>
          <button class="teacher-button" type="button">
            林老師 <span class="meta homeroom">(導師)</span>
          </button>
        </div>
      </section>

      <section class="candidate-group" aria-labelledby="other-title">
        <h2 class="group-title" id="other-title">其他可代課教師</h2>
        <div class="button-row">
          <button class="teacher-button" type="button">張老師 <span class="meta">(空堂)</span></button>
          <button class="teacher-button" type="button">黃老師 <span class="meta">(空堂)</span></button>
          <button class="teacher-button" type="button">李老師 <span class="meta">(空堂)</span></button>
        </div>
      </section>

      <div class="collapsible-sample">顯示更多候選教師</div>

      <footer class="action-row">
        <button class="action-button" type="button">取消</button>
        <button class="action-button primary" type="button">確認</button>
      </footer>
    </article>
  </main>
</body>
</html>
